# Базовая конфигурация: AV модель с cross-attention слиянием.
# Все цифры можно (и нужно) править под себя.

experiment:
  name: avsr_baseline
  seed: 42
  output_dir: checkpoints/avsr_baseline

data:
  train_manifest: data/manifests/train.jsonl
  val_manifest: data/manifests/val.jsonl
  max_duration: 15.0
  num_workers: 2          # на Colab больше 2 обычно вредно
  batch_size: 4           # бесплатная GPU не вытянет больше
  grad_accum: 4           # эффективный батч = 4 * 4 = 16

audio:
  sample_rate: 16000
  n_mels: 80
  hop_length: 160
  win_length: 400

video:
  fps: 25
  lip_size: 96

model:
  mode: av                # av / audio_only / video_only
  d_model: 512
  modality_dropout: 0.1   # с вероятностью 10% зануляем одну из веток

  audio_encoder:
    name: openai/whisper-small
    freeze: true
    d_audio: 768          # выход whisper-small encoder

  video_encoder:
    d_video: 512
    n_layers: 4
    n_heads: 8

  fusion:
    type: cross_attention # cross_attention / concat
    n_layers: 2
    n_heads: 8
    dropout: 0.1

training:
  optimizer: adamw
  lr: 1.0e-4
  weight_decay: 0.01
  warmup_steps: 1000
  max_epochs: 20
  patience: 5
  grad_clip: 5.0
  mixed_precision: true   # FP16 — обязательно на бесплатной GPU
  label_smoothing: 0.0    # CTC не любит сглаживание, оставляем 0

augmentation:
  audio:
    spec_augment: true
    freq_mask: 27
    time_mask: 10
    noise_snr_db: [0, 5, 10, 15, 20]   # в обучении сэмплируем случайный
    noise_prob: 0.5
  video:
    horizontal_flip: 0.5
    random_crop: 88       # из 96
    brightness: 0.2

logging:
  use_tensorboard: true
  use_wandb: false
  log_every_n_steps: 50
  val_every_n_epochs: 1
